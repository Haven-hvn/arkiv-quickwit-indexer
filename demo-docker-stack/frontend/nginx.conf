server {
    listen 8080;
    server_name _;

    # Static search page.
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy the Quickwit REST API so the page needs no CORS setup and the
    # browser only ever talks to this one port.
    location /api/ {
        proxy_pass http://quickwit:7280/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
}
